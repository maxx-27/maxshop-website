<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MaxShop Admin - Edit Product</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
        body { background-color: #050505; color: #d4e4fa; }
        .glass-panel { background: #0F1115; border: 1px solid rgba(255,255,255,0.05); }
        .deep-inset { background: #0A0A0A; border: 1px solid rgba(255,255,255,0.1); transition: border-color 0.2s ease; }
        .deep-inset:focus { outline: none; border-color: #0066ff; box-shadow: 0 0 0 2px rgba(0,102,255,0.2); }
        input, textarea, select { color: #ffffff !important; caret-color: #ffffff !important; -webkit-text-fill-color: #ffffff !important; }
        input::placeholder, textarea::placeholder { color: #4b5563 !important; -webkit-text-fill-color: #4b5563 !important; }
        input:-webkit-autofill { -webkit-text-fill-color: #ffffff !important; -webkit-box-shadow: 0 0 0 1000px #0A0A0A inset !important; }
</style>
<script id="tailwind-config">
tailwind.config = { darkMode:"class", theme:{ extend:{ colors:{ "surface-container-lowest":"#010f1f","surface-container-low":"#0d1c2d","surface-container":"#122131","surface-container-high":"#1c2b3c","surface-container-highest":"#273647","primary-container":"#0066ff","primary":"#b3c5ff","on-primary":"#002b75","on-primary-container":"#f8f7ff","secondary":"#e9c349","secondary-container":"#af8d11","error":"#ffb4ab","error-container":"#93000a","on-surface":"#d4e4fa","on-surface-variant":"#c2c6d8","outline-variant":"#424656","background":"#051424","surface":"#051424" }, spacing:{ "input-height":"48px","gutter":"24px","card-padding":"20px" }, fontFamily:{ "headline-lg":["Inter"],"headline-md":["Inter"],"body-md":["Inter"],"label-md":["Inter"],"label-sm":["Inter"] }, fontSize:{ "headline-lg":["32px",{"lineHeight":"1.2","letterSpacing":"-0.01em","fontWeight":"600"}],"headline-md":["24px",{"lineHeight":"1.3","fontWeight":"600"}],"body-md":["16px",{"lineHeight":"1.6","fontWeight":"400"}],"label-md":["14px",{"lineHeight":"1.4","letterSpacing":"0.01em","fontWeight":"500"}],"label-sm":["12px",{"lineHeight":"1.2","letterSpacing":"0.05em","fontWeight":"600"}] } } } }
</script>
</head>
<body class="font-body-md text-body-md antialiased">

<!-- Sidebar -->
<aside class="fixed left-0 top-0 h-full w-64 border-r border-white/5 bg-[#0F1115] hidden md:flex flex-col py-6 z-40">
<div class="px-6 mb-8">
<h2 class="text-lg font-bold text-white">MaxShop</h2>
<p class="text-[10px] text-slate-500 uppercase tracking-widest">Management Suite</p>
</div>
<nav class="flex-1 px-2 space-y-1">
<a class="text-slate-500 hover:text-slate-200 hover:bg-white/5 px-4 py-3 flex items-center gap-3 transition-all" href="admin-overview.html"><span class="material-symbols-outlined">dashboard</span><span class="font-label-md">Overview</span></a>
<a class="bg-blue-600/10 text-blue-500 border-r-2 border-blue-500 px-4 py-3 flex items-center gap-3" href="admin-products.html"><span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">inventory_2</span><span class="font-label-md">Inventory</span></a>
<a class="text-slate-500 hover:text-slate-200 hover:bg-white/5 px-4 py-3 flex items-center gap-3 transition-all" href="#"><span class="material-symbols-outlined">payments</span><span class="font-label-md">Sales</span></a>
<a class="text-slate-500 hover:text-slate-200 hover:bg-white/5 px-4 py-3 flex items-center gap-3 transition-all" href="admin-settings.html"><span class="material-symbols-outlined">settings</span><span class="font-label-md">Settings</span></a>
</nav>
<div class="px-4 mt-auto">
<button onclick="window.location.href='admin-add-product.html'" class="w-full bg-primary-container text-on-primary-container font-label-md py-3 rounded-lg flex items-center justify-center gap-2 hover:brightness-110 transition-all active:scale-95">
<span class="material-symbols-outlined">add</span>Add New Product
</button>
<div class="mt-6 border-t border-white/5 pt-4">
<a class="text-slate-500 hover:text-red-400 px-4 py-3 flex items-center gap-3 transition-all" href="login.html"><span class="material-symbols-outlined">logout</span><span class="font-label-md">Logout</span></a>
</div>
</div>
</aside>

<!-- Main -->
<main class="md:ml-64 min-h-screen">
<header class="flex justify-between items-center w-full px-10 py-6 z-30 bg-black/80 backdrop-blur-xl border-b border-white/10 sticky top-0">
<div class="flex items-center gap-4">
<button onclick="history.back()" class="text-slate-400 hover:text-white transition-colors"><span class="material-symbols-outlined">arrow_back</span></button>
<h1 class="font-headline-md text-white">Edit Product</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-slate-400 hover:text-white cursor-pointer">notifications</span>
<span class="material-symbols-outlined text-slate-400 hover:text-white cursor-pointer">settings</span>
</div>
</header>

<div class="max-w-[1200px] mx-auto px-10 py-10">
<div class="grid grid-cols-12 gap-8">
<!-- Left -->
<div class="col-span-12 lg:col-span-8 space-y-8">
<section class="glass-panel p-8 rounded-xl">
<div class="flex justify-between items-center mb-6">
<h2 class="font-label-md text-white uppercase tracking-widest opacity-60">General Information</h2>
<div class="flex items-center gap-2 px-3 py-1 bg-surface-container-highest rounded-full border border-white/5">
<span class="w-2 h-2 rounded-full bg-green-500"></span>
<span class="text-[11px] font-bold text-green-500 uppercase">Active</span>
</div>
</div>
<div class="space-y-6">
<div>
<label class="block text-label-sm text-slate-400 mb-2 uppercase tracking-wide">Product Name</label>
<input id="edit-name" class="w-full h-[52px] px-4 rounded-lg deep-inset font-medium focus:ring-0" type="text"/>
</div>
<div>
<label class="block text-label-sm text-slate-400 mb-2 uppercase tracking-wide">Description</label>
<textarea id="edit-desc" class="w-full p-4 rounded-lg deep-inset font-medium focus:ring-0 resize-none" rows="6"></textarea>
</div>
</div>
</section>
<div class="grid grid-cols-2 gap-8">
<div class="glass-panel p-8 rounded-xl">
<label class="block text-label-sm text-slate-400 mb-2 uppercase tracking-wide">Price (IDR)</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-bold">Rp</span>
<input id="edit-price" class="w-full h-[52px] pl-12 pr-4 rounded-lg deep-inset font-bold focus:ring-0" type="text"/>
</div>
</div>
<div class="glass-panel p-8 rounded-xl">
<label class="block text-label-sm text-slate-400 mb-2 uppercase tracking-wide">Badge</label>
<input id="edit-badge" class="w-full h-[52px] px-4 rounded-lg deep-inset font-medium focus:ring-0" type="text" placeholder="e.g. Premium"/>
</div>
</div>
</div>

<!-- Right -->
<div class="col-span-12 lg:col-span-4 space-y-8">
<section class="glass-panel p-6 rounded-xl">
<div class="flex justify-between items-center mb-4">
<h2 class="font-label-md text-white uppercase tracking-widest opacity-60">Product Image</h2>
</div>
<div class="relative group">
<div class="aspect-square w-full rounded-lg overflow-hidden bg-black/40 border border-white/10">
<img id="edit-img-preview" class="w-full h-full object-cover" alt="Product" src=""/>
</div>
</div>
<div class="mt-4">
<label class="block text-label-sm text-slate-400 mb-2">Image URL</label>
<input id="edit-image" class="w-full h-[48px] px-4 rounded-lg deep-inset text-sm focus:ring-0" type="text" placeholder="https://..."/>
</div>
</div>

<section class="glass-panel p-6 rounded-xl border-l-4 border-secondary/50">
<div class="space-y-4">
<div class="flex justify-between items-center">
<span class="text-label-sm text-slate-500">Product ID</span>
<span id="edit-id-display" class="text-label-sm text-white font-mono text-xs"></span>
</div>
<div class="flex justify-between items-center">
<span class="text-label-sm text-slate-500">Stock</span>
<input id="edit-stock" class="w-24 h-8 px-3 rounded deep-inset text-sm text-right focus:ring-0" type="number"/>
</div>
</div>
</section>

<div class="flex flex-col gap-4">
<button id="update-btn" class="w-full h-14 bg-primary-container text-on-primary-container font-bold rounded-lg flex items-center justify-center gap-3 shadow-[0_0_20px_rgba(0,102,255,0.3)] hover:scale-[1.02] active:scale-[0.98] transition-all">
<span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">save</span>UPDATE PRODUCT
</button>
<button id="delete-btn" class="w-full h-14 bg-transparent border border-error/30 text-error font-bold rounded-lg flex items-center justify-center gap-3 hover:bg-error/10 hover:border-error transition-all">
<span class="material-symbols-outlined">delete</span>DELETE PRODUCT
</button>
</div>
</div>
</div>
</div>
</main>

<!-- Toast -->
<div id="toast" class="hidden fixed top-6 right-6 z-[999] px-6 py-4 rounded-xl text-white font-semibold shadow-2xl text-sm flex items-center gap-3 bg-blue-600">
<span class="material-symbols-outlined text-base">check_circle</span><span id="toast-text">Done!</span>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const productId = params.get('id');
const products = JSON.parse(localStorage.getItem('maxshop_products') || '[]');
const product = products.find(p => p.id === productId);

if (product) {
    document.getElementById('edit-name').value = product.name || '';
    document.getElementById('edit-desc').value = product.desc || '';
    document.getElementById('edit-price').value = product.price || '';
    document.getElementById('edit-badge').value = product.badge || '';
    document.getElementById('edit-image').value = product.image || '';
    document.getElementById('edit-stock').value = product.stock || 0;
    document.getElementById('edit-id-display').textContent = product.id;
    if (product.image) document.getElementById('edit-img-preview').src = product.image;
}

document.getElementById('edit-image').addEventListener('input', function() {
    document.getElementById('edit-img-preview').src = this.value;
});

function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.className = `fixed top-6 right-6 z-[999] px-6 py-4 rounded-xl text-white font-semibold shadow-2xl text-sm flex items-center gap-3 ${type==='success'?'bg-blue-600':'bg-red-600'}`;
    document.getElementById('toast-text').textContent = msg;
    t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 2800);
}

document.getElementById('update-btn').addEventListener('click', function() {
    if (!productId) return;
    const idx = products.findIndex(p => p.id === productId);
    if (idx === -1) return;
    products[idx] = {
        ...products[idx],
        name:  document.getElementById('edit-name').value.trim(),
        desc:  document.getElementById('edit-desc').value.trim(),
        price: parseInt(document.getElementById('edit-price').value) || products[idx].price,
        badge: document.getElementById('edit-badge').value.trim(),
        image: document.getElementById('edit-image').value.trim(),
        stock: parseInt(document.getElementById('edit-stock').value) || 0,
    };
    localStorage.setItem('maxshop_products', JSON.stringify(products));
    showToast('Produk berhasil diupdate!');
    setTimeout(() => window.location.href = 'admin-products.html', 1500);
});

document.getElementById('delete-btn').addEventListener('click', function() {
    if (!confirm('Yakin ingin menghapus produk ini?')) return;
    const filtered = products.filter(p => p.id !== productId);
    localStorage.setItem('maxshop_products', JSON.stringify(filtered));
    showToast('Produk dihapus!');
    setTimeout(() => window.location.href = 'admin-products.html', 1200);
});
</script>
</body></html>
