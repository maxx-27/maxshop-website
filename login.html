<!-- Login Container -->
<main class="relative z-10 w-full max-w-[480px] px-6">
<div class="glass-panel p-10 rounded-xl shadow-[0_24px_48px_rgba(0,0,0,0.6)]">
<!-- Branding Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary-container mb-6 shadow-[0_0_30px_rgba(0,102,255,0.3)]">

</div>
<h1 class="font-headline-xl text-headline-xl text-white tracking-tighter mb-2">MaxShop</h1>
<p class="font-body-md text-on-surface-variant">Sign in to your premium account</p>
</div>
<form id="login-form" class="space-y-6">
<!-- Error Message -->
<div id="login-error" class="hidden bg-red-500/10 border border-red-500/30 text-red-400 text-sm px-4 py-3 rounded-lg flex items-center gap-2">

</div>
<!-- Username/Email Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface block" for="identity">Username or Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
<input class="w-full h-input-height pl-12 pr-4 deep-inset border border-outline-variant rounded-lg text-white font-body-md placeholder:text-outline-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="identity" name="identity" placeholder="Enter your username" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface block" for="password">Password</label>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="key">key</span>
<input class="w-full h-input-height pl-12 pr-4 deep-inset border border-outline-variant rounded-lg text-white font-body-md placeholder:text-outline-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>

<span>Login</span>
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>

<script>
document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const username = document.getElementById('identity').value.trim();
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('login-error');
    const errorText = document.getElementById('error-text');
    const btn = document.getElementById('login-btn');

    // Kredensial Admin
    const ADMIN_USER = 'Max';
    const ADMIN_PASS = 'MaxShop0327_#';

    if (!username || !password) {
        errorText.textContent = 'Username dan password wajib diisi.';
        errorEl.classList.remove('hidden');
        return;
    }

    if (username === ADMIN_USER && password === ADMIN_PASS) {
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Logging in...';
        sessionStorage.setItem('maxshop_auth', 'true');
        sessionStorage.setItem('maxshop_user', username);
        setTimeout(() => { window.location.href = 'admin-overview.html'; }, 800);
    } else {
        errorText.textContent = 'Username atau password salah. Coba lagi.';
        errorEl.classList.remove('hidden');
        document.getElementById('password').value = '';
    }
});
</script>
