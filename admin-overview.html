<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-container": "#0066ff"
            }
          }
        }
      }
</script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { background-color: #050505; }
</style>
</head>
<body class="font-['Inter'] antialiased text-white bg-black">
<aside class="fixed h-screen w-64 left-0 top-0 border-r border-white/10 bg-[#050505] shadow-[4px_0_24px_rgba(0,0,0,0.5)] z-50 flex flex-col py-6">
<div class="px-6 mb-10">
<h1 class="text-2xl font-black tracking-tighter text-white">MaxShop</h1>
<p class="text-xs text-slate-500 font-medium tracking-widest uppercase">Premium Admin</p>
</div>
<nav class="flex-1 space-y-1">
<a class="flex items-center gap-3 px-4 py-3 text-blue-500 bg-[#0066FF]/5 border-r-2 border-[#0066FF] font-semibold transition-all duration-200" href="admin-overview.html">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="text-sm">Overview</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-slate-400 font-medium hover:bg-white/5 hover:text-white transition-all duration-200" href="admin-products.html">
<span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
<span class="text-sm">Products</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-slate-400 font-medium hover:bg-white/5 hover:text-white transition-all duration-200" href="admin-settings.html">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="text-sm">Settings</span>
</a>
</nav>
</aside>
<main class="ml-64 min-h-screen">
<header class="sticky top-0 z-40 w-full border-b border-white/10 bg-[#050505]/80 backdrop-blur-xl flex justify-between items-center h-16 px-8 shadow-sm">
<div class="flex items-center gap-4 flex-1">
<div class="relative w-full max-w-md">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-lg">search</span>
<input class="w-full bg-slate-900/50 border-none rounded-lg pl-10 pr-4 py-2 text-sm text-slate-300 focus:ring-1 focus:ring-blue-600 transition-all" placeholder="Search analytics..." type="text"/>
</div>
</div>
<div class="flex items-center gap-6">
<span class="text-sm font-bold text-white tracking-tight">MaxShop Admin</span>
</div>
</header>
<div class="p-10 max-w-[1440px] mx-auto space-y-10">
<div class="flex justify-between items-end">
<div>
<h2 class="text-3xl font-semibold mb-1">Executive Overview</h2>
<p class="text-slate-400">Real-time performance metrics for MaxShop Premium.</p>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
<div class="bg-[#0F1115] p-6 rounded-xl border border-white/5 shadow-xl relative overflow-hidden group">
<p class="text-xs uppercase tracking-wider text-slate-400 mb-2">Total Revenue</p>
<h3 class="text-2xl font-semibold text-white mb-2">Rp 125.000.000</h3>
</div>
<div class="bg-[#0F1115] p-6 rounded-xl border border-white/5 shadow-xl relative overflow-hidden group">
<p class="text-xs uppercase tracking-wider text-slate-400 mb-2">Total Orders</p>
<h3 class="text-2xl font-semibold text-white mb-2">1,240</h3>
</div>
<div class="bg-[#0F1115] p-6 rounded-xl border border-white/5 shadow-xl relative overflow-hidden group">
<p class="text-xs uppercase tracking-wider text-slate-400 mb-2">Active Customers</p>
<h3 class="text-2xl font-semibold text-white mb-2">850</h3>
</div>
<div class="bg-[#0F1115] p-6 rounded-xl border border-white/5 shadow-xl relative overflow-hidden group">
<p class="text-xs uppercase tracking-wider text-slate-400 mb-2">Pending Orders</p>
<h3 class="text-2xl font-semibold text-white mb-2">12</h3>
</div>
</div>
</div>
</main>
</body></html>
